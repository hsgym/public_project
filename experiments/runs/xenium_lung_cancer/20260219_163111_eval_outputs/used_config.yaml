base_config:
  measurement_type: xenium
  tissue_type: lung_cancer
  width: 4096
  height: 4096
st_data_load_config:
  fov: 19
  z: null
  input_dir: /work/dataset/Lung_Cancer/xenium/Xenium_V1_humanLung_Cancer_FFPE_outs
  output_dir: /work/subset_lung_cancer
sc_data_load_config:
  preprocessed_type: None
  ref_path: /work/my_data/reference_lung/tLung/Lung_Cancer_expression_cells_x_genes_tLung*.parquet
marker_selection_config:
  number_of_markers: 10
qtree_config:
  limit_depth: 6
  assign_thresh: 0.25
  assign_thresh_lower: 0.4
  sim_thresh: 0.9
  neighbor_weight: 0.7
  score_margin: 0.5
  sim_method: cosine
weight_calculation_config:
  boundary_threshold_px: 4
  neighbor_score_threshold: 0.2
  soft_k: 2
  alpha: 1.5
  beta: 1.0
  min_weight: 0.01
prior_estimation_config:
  gmm_sigma_list:
  - 0.5
  - 1.0
  - 1.5
  grid_size: 3
  weight_threshold: 0.1
  gene_filter_min_ratio: 0.01
  gene_filter_min_count: 5
  global_moran_threshold: 0.05
  number_of_svgs: 20
  distance_threshold: 30
  size_for_minimum_filter: 10
model_config:
  max_iter: 3
  batch_size: 200000
  reg_covar: 1.0e-06
  smoothing_alpha: 0.01
  entropy_beta: 0.1
  search_radius: 50.0
  distance_threshold: 30.0
  lambda_weight: 1.0
  lambda_dist: 1.0
  scale_T: 1.0
  weight_threshold: 0.01
  n_jobs: -1
save_config:
  enabled: true
  phase: eval
  run_name: None
